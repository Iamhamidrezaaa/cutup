<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="admin.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08); }
    .login-card h1 { margin: 0 0 20px; font-size: 22px; letter-spacing: -0.02em; }
    .login-card label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
    .login-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font: inherit; margin-bottom: 14px; }
    .login-card .btn { width: 100%; margin-top: 8px; }
    .login-error { color: var(--err); font-size: 14px; margin-top: 12px; min-height: 1.25em; }
    .login-error[hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Admin Login</h1>
      <form id="adminLoginForm" autocomplete="on" novalidate>
        <label for="adminEmail">Email</label>
        <input id="adminEmail" name="email" type="email" required autocomplete="username">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" name="password" type="password" required autocomplete="current-password">
        <button type="submit" class="btn">Login</button>
        <p id="adminLoginError" class="login-error" role="alert" hidden></p>
      </form>
    </div>
  </div>
  <script>
    (function () {
      var API_BASE_URL = window.location.origin;
      var form = document.getElementById('adminLoginForm');
      var errEl = document.getElementById('adminLoginError');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.hidden = true;
        errEl.textContent = '';
        var email = (document.getElementById('adminEmail').value || '').trim();
        var password = document.getElementById('adminPassword').value || '';
        try {
          var r = await fetch(API_BASE_URL + '/api/admin/login', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
          });
          var data = await r.json().catch(function () { return {}; });
          if (r.ok && data.ok) {
            window.location.replace('/admin.html');
            return;
          }
          if (r.status === 429) {
            errEl.textContent = 'Too many attempts. Please try again later.';
          } else {
            errEl.textContent = 'Invalid email or password';
          }
          errEl.hidden = false;
        } catch (ex) {
          errEl.textContent = 'Invalid email or password';
          errEl.hidden = false;
        }
      });
    })();
  </script>
</body>
</html>
