<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Cutup</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="admin.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08); }
    .login-card h1 { margin: 0 0 20px; font-size: 22px; letter-spacing: -0.02em; }
    .login-card label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
    .login-card input[type="email"], .login-card input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font: inherit; margin-bottom: 14px; }
    .login-row-check { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 14px; color: var(--text); }
    .login-row-check input { width: auto; margin: 0; }
    .login-card .btn { width: 100%; margin-top: 8px; }
    .login-error { color: var(--err); font-size: 14px; margin-top: 12px; min-height: 1.25em; }
    .login-error[hidden] { display: none !important; }
    .login-links { margin-top: 16px; font-size: 14px; text-align: center; }
    .login-links a { color: var(--primary); text-decoration: none; }
    .login-links a:hover { text-decoration: underline; }
    .login-link-arrow { display: inline-block; margin-left: 0.2em; font-weight: 400; }
    .admin-dashboard-shell {
      display: none;
      width: 100%;
      min-height: 100vh;
    }
    .admin-dashboard-shell.adminha-dashboard-visible {
      display: block;
    }
    .admin-dashboard-frame {
      display: block;
      width: 100%;
      height: 100vh;
      border: 0;
      background: var(--bg, #f3f5fb);
    }
  </style>
</head>
<body>
  <div id="loginPageWrap" class="login-page">
    <div class="login-card">
      <h1>Admin Login</h1>
      <form id="adminLoginForm" autocomplete="on" novalidate>
        <label for="adminEmail">Email</label>
        <input id="adminEmail" name="email" type="email" required autocomplete="username">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" name="password" type="password" required autocomplete="current-password">
        <div class="login-row-check">
          <input type="checkbox" id="adminRememberMe" name="remember">
          <label for="adminRememberMe" style="margin:0;font-weight:500;color:var(--text);">Remember me</label>
        </div>
        <button type="submit" id="adminLoginSubmitBtn" class="btn">Login</button>
        <p id="adminLoginError" class="login-error" role="alert" hidden></p>
      </form>
      <p class="login-links">
        <a href="/admin-forgot.html">Forgot password<span class="login-link-arrow" aria-hidden="true"> →</span></a>
      </p>
    </div>
  </div>
  <div id="adminDashboardShell" class="admin-dashboard-shell" hidden style="display:none">
    <iframe id="adminPanelFrame" class="admin-dashboard-frame" title="Cutup Admin panel" src="about:blank"></iframe>
  </div>
  <script src="api-config.js"></script>
  <script>
    (function () {
      var LS_REMEMBER = 'cutup_adminha_remember';
      var LS_EMAIL = 'cutup_adminha_email';
      var LS_PASSWORD = 'cutup_adminha_password';
      var SESSION_FLAG = 'cutup_adminha_signed_in';
      var FRAME_SRC = 'site-admin.html';

      function apiBase() {
        var b = window.CUTUP_API_BASE;
        if (typeof b !== 'string') return '';
        return b.replace(/\/$/, '');
      }

      function apiUrl(path) {
        var p = path.charAt(0) === '/' ? path : '/' + path;
        var base = apiBase();
        return base ? base + p : p;
      }

      function showAdminDashboard() {
        console.log('[adminha] showAdminDashboard');
        var wrap = document.getElementById('loginPageWrap');
        var shell = document.getElementById('adminDashboardShell');
        var frame = document.getElementById('adminPanelFrame');
        if (wrap) {
          wrap.setAttribute('hidden', '');
          wrap.style.display = 'none';
        }
        if (shell) {
          shell.removeAttribute('hidden');
          shell.style.display = 'block';
          shell.classList.add('adminha-dashboard-visible');
        }
        if (frame) frame.src = FRAME_SRC;
      }

      function showLoginView() {
        var wrap = document.getElementById('loginPageWrap');
        var shell = document.getElementById('adminDashboardShell');
        if (wrap) {
          wrap.removeAttribute('hidden');
          wrap.style.display = '';
        }
        if (shell) {
          shell.setAttribute('hidden', '');
          shell.style.display = 'none';
          shell.classList.remove('adminha-dashboard-visible');
        }
      }

      function loadSavedCredentials() {
        try {
          if (localStorage.getItem(LS_REMEMBER) !== '1') return;
          var e = localStorage.getItem(LS_EMAIL);
          var p = localStorage.getItem(LS_PASSWORD);
          if (e) document.getElementById('adminEmail').value = e;
          if (p) document.getElementById('adminPassword').value = p;
          document.getElementById('adminRememberMe').checked = true;
        } catch (err) {}
      }

      function persistCredentials(email, password, remember) {
        try {
          if (remember) {
            localStorage.setItem(LS_REMEMBER, '1');
            localStorage.setItem(LS_EMAIL, email);
            localStorage.setItem(LS_PASSWORD, password);
          } else {
            localStorage.removeItem(LS_REMEMBER);
            localStorage.removeItem(LS_EMAIL);
            localStorage.removeItem(LS_PASSWORD);
          }
        } catch (err) {}
      }

      async function bootstrapSession() {
        var hadFlag = false;
        try {
          hadFlag = localStorage.getItem(SESSION_FLAG) === '1';
        } catch (e) {}
        if (hadFlag) {
          console.log('[adminha] bootstrap: SESSION_FLAG present, showing dashboard until /auth/me verifies');
          showAdminDashboard();
        }
        try {
          console.log('[adminha] bootstrap: GET', apiUrl('/api/admin/auth/me'));
          var r = await fetch(apiUrl('/api/admin/auth/me'), { credentials: 'include' });
          var data = await r.json().catch(function () { return {}; });
          console.log('[adminha] bootstrap: auth/me response', r.status, data);
          if (r.ok && data.ok) {
            showAdminDashboard();
            try {
              localStorage.setItem(SESSION_FLAG, '1');
            } catch (e) {}
            return;
          }
        } catch (err) {
          console.warn('[adminha] bootstrap: auth/me error', err);
        }
        try {
          localStorage.removeItem(SESSION_FLAG);
        } catch (e) {}
        if (hadFlag) showLoginView();
      }

      async function handleLogin() {
        console.log('[adminha] handleLogin: start');
        var errEl = document.getElementById('adminLoginError');
        var submitBtn = document.getElementById('adminLoginSubmitBtn');
        errEl.hidden = true;
        errEl.textContent = '';
        var email = (document.getElementById('adminEmail').value || '').trim();
        var password = document.getElementById('adminPassword').value || '';
        var rememberMe = document.getElementById('adminRememberMe').checked;
        if (!email || !password) {
          errEl.textContent = 'Email and password are required.';
          errEl.hidden = false;
          return;
        }
        if (submitBtn) submitBtn.disabled = true;
        try {
          var url = apiUrl('/api/admin/login');
          console.log('[adminha] handleLogin: POST', url);
          var r = await fetch(url, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password, rememberMe: rememberMe })
          });
          var data = await r.json().catch(function () { return {}; });
          console.log('[adminha] handleLogin: response', r.status, data);
          if (r.ok && (data.success || data.ok)) {
            persistCredentials(email, password, rememberMe);
            try {
              localStorage.setItem(SESSION_FLAG, '1');
            } catch (e) {}
            showAdminDashboard();
            return;
          }
          if (r.status === 503) {
            errEl.textContent = 'Server is not configured (database missing). Check DATABASE_URL on the host.';
          } else {
            errEl.textContent = data.error || 'Invalid email or password.';
          }
          errEl.hidden = false;
        } catch (ex) {
          console.error('[adminha] handleLogin: error', ex);
          errEl.textContent = 'Network error. Check connection and API URL.';
          errEl.hidden = false;
        } finally {
          if (submitBtn) submitBtn.disabled = false;
        }
      }

      loadSavedCredentials();

      try {
        if (localStorage.getItem(SESSION_FLAG) === '1') {
          console.log('[adminha] SESSION_FLAG on load');
        }
      } catch (e) {}

      bootstrapSession();

      var form = document.getElementById('adminLoginForm');
      if (!form) {
        console.error('[adminha] adminLoginForm not found');
      } else {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          console.log('[adminha] form submit');
          handleLogin();
        });
      }
    })();
  </script>
</body>
</html>
