<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page not found | Cutup</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#6366f1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #0f172a;
      --muted: #64748b;
      --primary: #5b4ce6;
      --primary-hover: #4f3fd9;
      --card: rgba(255, 255, 255, 0.88);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, #e0e7ff 0%, #f8fafc 38%, #ede9fe 72%, #e0f2fe 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
    }
    .err-header {
      padding: 20px 28px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
    }
    .err-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: -0.02em;
    }
    .err-brand img {
      display: block;
      border-radius: 10px;
    }
    .err-brand:hover {
      color: var(--primary);
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px max(16px, env(safe-area-inset-right)) 32px max(16px, env(safe-area-inset-left));
      min-width: 0;
    }
    .err-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 440px;
      min-width: 0;
      margin: 0 auto;
      padding: clamp(28px, 6vw, 40px) clamp(20px, 5vw, 36px);
      background: var(--card);
      border-radius: 20px;
      border: 1px solid rgba(99, 102, 241, 0.15);
      box-shadow:
        0 4px 6px -1px rgba(15, 23, 42, 0.06),
        0 24px 48px -12px rgba(91, 76, 230, 0.18);
      animation: errFadeScale 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes errFadeScale {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(12px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    .err-code {
      font-size: clamp(3.25rem, 14vw, 6.5rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 1;
      margin: 0;
      max-width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6 45%, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: errFadeScale 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both;
    }
    h1 {
      margin: 12px 0 0;
      font-size: clamp(1.2rem, 4.2vw, 1.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      max-width: 100%;
    }
    .err-sub {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: clamp(0.9375rem, 2.8vw, 1rem);
      line-height: 1.55;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      padding: 12px 26px;
      max-width: 100%;
      box-sizing: border-box;
      font: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(91, 76, 230, 0.35);
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }
    .btn-home:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(91, 76, 230, 0.4);
    }
    .btn-home:focus-visible {
      outline: 3px solid rgba(91, 76, 230, 0.45);
      outline-offset: 2px;
    }
    @media (max-width: 640px) {
      .err-header {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <script src="/site-chrome.js"></script>
  <header class="err-header">
    <a href="/" class="err-brand">
      <img src="/logo.svg" alt="" width="40" height="40" decoding="async">
      <span>Cutup</span>
    </a>
  </header>
  <main>
    <div class="err-panel">
      <p class="err-code" aria-hidden="true">404</p>
      <h1>Page not found</h1>
      <p class="err-sub">The page you’re looking for doesn’t exist or was moved.</p>
      <a class="btn-home" href="/">Back to home</a>
    </div>
  </main>
</body>
</html>
