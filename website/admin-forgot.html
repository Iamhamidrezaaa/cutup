<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Forgot password | Cutup Admin</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="responsive-global.css?v=1">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08); }
    .login-card h1 { margin: 0 0 12px; font-size: 20px; }
    .login-card p.lead { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .login-card label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
    .login-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font: inherit; margin-bottom: 14px; }
    .login-card .btn { width: 100%; margin-top: 8px; }
    .msg { font-size: 14px; margin-top: 12px; min-height: 1.25em; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
    .msg[hidden] { display: none !important; }
    .login-links { margin-top: 16px; font-size: 14px; text-align: center; }
    .login-links a { color: var(--primary); text-decoration: none; }
    .login-links a:hover { text-decoration: underline; }
    .login-link-arrow { display: inline-block; margin-right: 0.2em; font-weight: 400; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Forgot password</h1>
      <p class="lead">Enter the email for your admin account. If it exists (any role), we’ll email you a link to set a new password. SMTP must be configured on the server.</p>
      <form id="forgotForm" novalidate>
        <label for="forgotEmail">Email</label>
        <input id="forgotEmail" type="email" required autocomplete="email">
        <button type="submit" class="btn">Send reset link</button>
        <p id="forgotMsg" class="msg" role="status" hidden></p>
      </form>
      <p class="login-links">
        <a href="/adminha.html"><span class="login-link-arrow" aria-hidden="true">← </span>Back to admin login</a>
      </p>
    </div>
  </div>
  <script src="api-config.js"></script>
  <script>
    (function () {
      var API_BASE_URL = window.CUTUP_API_BASE;
      var form = document.getElementById('forgotForm');
      var msg = document.getElementById('forgotMsg');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.hidden = true;
        msg.className = 'msg';
        var email = (document.getElementById('forgotEmail').value || '').trim();
        if (!email) return;
        try {
          var r = await fetch(API_BASE_URL + '/api/admin/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
          });
          var data = await r.json().catch(function () { return {}; });
          if (r.status === 429) {
            msg.textContent = 'Too many requests. Try again in about an hour.';
            msg.classList.add('err');
            msg.hidden = false;
            return;
          }
          if (data.ok) {
            msg.textContent = 'If this email is registered as an admin, you’ll receive a message with a reset link shortly. Check your spam folder.';
            msg.classList.add('ok');
            msg.hidden = false;
            return;
          }
          msg.textContent = 'Something went wrong. Please try again later.';
          msg.classList.add('err');
          msg.hidden = false;
        } catch (ex) {
          msg.textContent = 'Network error. Check your connection.';
          msg.classList.add('err');
          msg.hidden = false;
        }
      });
    })();
  </script>
</body>
</html>
