<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Cutup</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="checkout.css?v=PLAN_FLOW_2026_01">
  <style>
    .cutup-login-wrap { max-width: 420px; margin: 48px auto; padding: 0 20px; font-family: Inter, system-ui, sans-serif; }
    .cutup-login-card { background: #fff; border: 1px solid rgba(99,102,241,.14); border-radius: 16px; padding: 28px; box-shadow: 0 8px 28px rgba(15,23,42,.06); }
    .cutup-login-card h1 { margin: 0 0 8px; font-size: 22px; color: #0f172a; }
    .cutup-login-card p { margin: 0 0 16px; color: #64748b; font-size: 14px; line-height: 1.55; }
    .cutup-login-google { width: 100%; padding: 12px 16px; font-size: 15px; font-weight: 600; border-radius: 10px; border: 1px solid #dadce0; background: #fff; cursor: pointer; }
    .cutup-login-google:disabled { opacity: .6; cursor: wait; }
    .cutup-login-back { display: inline-block; margin-top: 20px; font-size: 14px; color: #6366f1; text-decoration: none; }
    .cutup-login-blocked { display: none; }
    .cutup-login-blocked.is-visible { display: block; }
    .cutup-login-signin.is-hidden { display: none; }
    .cutup-login-block-until { margin: 16px 0; padding: 14px 16px; border-radius: 10px; background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.18); font-size: 16px; color: #0f172a; text-align: center; }
    .cutup-login-block-until strong { font-weight: 600; }
    .cutup-login-block-email { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
    .cutup-login-try-another { width: 100%; margin-top: 8px; padding: 12px 16px; font-size: 15px; font-weight: 600; border-radius: 10px; border: none; background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; cursor: pointer; }
    .cutup-login-try-another:hover { filter: brightness(1.05); }
  </style>
</head>
<body class="cutup-checkout-body">
  <div class="cutup-login-wrap">
    <div class="cutup-login-brand" style="margin-bottom:24px"><a href="https://cutup.shop">Cutup</a></div>
    <div class="cutup-login-card cutup-login-signin" id="cutupLoginSignin">
      <h1>Sign in to continue</h1>
      <p id="cutupLoginLead">Sign in to complete your upgrade securely.</p>
      <button type="button" class="cutup-login-google" id="cutupLoginGoogleBtn">Continue with Google</button>
    </div>
    <div class="cutup-login-card cutup-login-blocked" id="cutupLoginBlocked" role="alert" aria-live="polite">
      <h1 id="cutupLoginBlockedTitle">Account recently deleted</h1>
      <p class="cutup-login-block-email" id="cutupLoginBlockedEmail" hidden></p>
      <div id="cutupLoginBlockedBody"></div>
      <button type="button" class="cutup-login-try-another" id="cutupLoginTryAnotherBtn">Try another Google account</button>
    </div>
    <a class="cutup-login-back" href="/">← Back to Cutup</a>
  </div>
  <script src="api-config.js"></script>
  <script src="plan-checkout-router.js?v=LOGIN_BLOCK_2026_01"></script>
  <script src="login.js?v=LOGIN_RESUME_2026_05"></script>
</body>
</html>
