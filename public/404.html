<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page not found | Cutup</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f2f8;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #5b4ce6;
      --primary-hover: #4f3fd9;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #e0e7ff, var(--bg) 45%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      text-align: center;
      max-width: 420px;
    }
    .code {
      font-size: clamp(4.5rem, 18vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 1;
      background: linear-gradient(135deg, #6366f1, #8b5cf6 45%, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 8px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    p.sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      font: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(91, 76, 230, 0.35);
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }
    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(91, 76, 230, 0.4);
    }
    .btn:focus-visible {
      outline: 3px solid rgba(91, 76, 230, 0.45);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="code" aria-hidden="true">404</p>
    <h1>Page not found</h1>
    <p class="sub">The page you’re looking for doesn’t exist.</p>
    <a class="btn" href="https://cutup.shop">Go to homepage</a>
  </div>
</body>
</html>
