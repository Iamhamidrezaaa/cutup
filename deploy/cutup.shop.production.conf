# Full replacement for: /etc/nginx/sites-available/cutup.shop
# On server:
#   sudo cp /etc/nginx/sites-available/cutup.shop /etc/nginx/sites-available/cutup.shop.bak
#   sudo nano /etc/nginx/sites-available/cutup.shop   (paste all, save)
#   sudo rm -f /etc/nginx/sites-enabled/cutup.sho
#   sudo nginx -t && sudo systemctl reload nginx

# ---------- HTTP ----------
server {
    listen 80;
    listen [::]:80;
    server_name cutup.shop www.cutup.shop;

    root /var/www/cutup/website;
    index index.html;
    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/blog/([a-z0-9][a-z0-9-]*)/?$ {
        root /var/www/cutup;
        try_files /blog/$1.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}

# ---------- HTTPS ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cutup.shop www.cutup.shop;

    ssl_certificate /etc/letsencrypt/live/cutup.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cutup.shop/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/cutup/website;
    index index.html;
    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/blog/([a-z0-9][a-z0-9-]*)/?$ {
        root /var/www/cutup;
        try_files /blog/$1.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
