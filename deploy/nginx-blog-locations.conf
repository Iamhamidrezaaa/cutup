# Include inside BOTH server { } blocks for cutup.shop (HTTP :80 and HTTPS :443).
# Place BEFORE: location / {

    # Blog articles: /var/www/cutup/blog/{slug}.html
    location ~ ^/blog/([a-z0-9][a-z0-9-]*)/?$ {
        root /var/www/cutup;
        try_files /blog/$1.html =404;
    }

    # Optional legacy covers (canonical: /cms-media/images/blog/)
    location /images/blog/ {
        alias /var/www/cutup/public/images/blog/;
    }
