# Reference ONLY — merge into /etc/nginx/sites-available/cutup.shop
# Every "location" must be INSIDE a matching server { ... } block.

# ---------- Canonical host: www → apex (301) ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cutup.shop;

    ssl_certificate /etc/letsencrypt/live/cutup.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cutup.shop/privkey.pem;

    return 301 https://cutup.shop$request_uri;
}

# ---------- HTTPS (required for https://cutup.shop) ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cutup.shop;

    ssl_certificate /etc/letsencrypt/live/cutup.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cutup.shop/privkey.pem;

    root /var/www/cutup/website;
    index index.html;
    client_max_body_size 100M;

    # Long-running transcription + multipart upload (ffmpeg extract + ASR queue)
    location ~ ^/api/(upload|transcribe|youtube-download) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # >>> BLOG: must stay inside this server { } <<<
    location ~ ^/blog/([a-z0-9][a-z0-9-]*)/?$ {
        root /var/www/cutup;
        try_files /blog/$1.html =404;
    }

    # Fresh JS during deploys — avoid stale script.js breaking Shorts parser
    location ~* \.(js|mjs)$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}

# ---------- HTTP → HTTPS (apex only; avoids duplicate www content) ----------
server {
    listen 80;
    listen [::]:80;
    server_name cutup.shop www.cutup.shop;

    return 301 https://cutup.shop$request_uri;
}

